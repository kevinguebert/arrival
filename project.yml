name: TrafficMenubar
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"
options:
  bundleIdPrefix: com.trafficmenubar
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
targets:
  TrafficMenubar:
    type: application
    platform: macOS
    sources:
      - TrafficMenubar
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Traffic Menubar uses your location to detect whether you're near home or work to show the right commute direction."
        PRODUCT_BUNDLE_IDENTIFIER: com.trafficmenubar.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: Sentry
        product: Sentry
      - package: TelemetryDeck
        product: TelemetryDeck
    info:
      path: TrafficMenubar/Info.plist
      properties:
        SUFeedURL: https://kevinguebert.github.io/traffic-menubar/appcast.xml
        SUPublicEDKey: ""
        SentryDSN: $(SENTRY_DSN)
        TelemetryDeckAppID: $(TELEMETRYDECK_APP_ID)
    entitlements:
      path: TrafficMenubar/TrafficMenubar.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.personal-information.location: true
