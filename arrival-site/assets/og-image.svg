<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F1219"/>
      <stop offset="100%" stop-color="#161B26"/>
    </linearGradient>
    <linearGradient id="congestion" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#4DAD80"/>
      <stop offset="40%" stop-color="#4DAD80"/>
      <stop offset="55%" stop-color="#FDC021"/>
      <stop offset="70%" stop-color="#F77070"/>
      <stop offset="85%" stop-color="#FDC021"/>
      <stop offset="100%" stop-color="#4DAD80"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4DAD80"/>
      <stop offset="100%" stop-color="#21C45E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="rgba(77,173,128,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" stop-color="rgba(33,196,94,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#stripe)"/>

  <!-- App icon (simplified) -->
  <g transform="translate(80, 180)">
    <rect width="120" height="120" rx="27" fill="#0F1219" stroke="#2A2F3C" stroke-width="2"/>
    <rect x="0" y="0" width="120" height="4" rx="2" fill="url(#stripe)"/>
    <circle cx="30" cy="90" r="8" fill="#4DAD80"/>
    <path d="M30 90 C30 50, 90 70, 90 30" fill="none" stroke="url(#congestion)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="90" cy="30" r="8" fill="#4DAD80"/>
    <circle cx="90" cy="30" r="14" fill="none" stroke="#4DAD80" stroke-width="2" opacity="0.35"/>
  </g>

  <!-- Title text -->
  <text x="230" y="230" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="700" fill="#F0F2F5" letter-spacing="-1">Arrival</text>

  <!-- Subtitle -->
  <text x="230" y="280" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#8B93A1">Your drive time, at a glance.</text>

  <!-- Description -->
  <text x="80" y="390" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#6B7280">A macOS menu bar app that shows your commute</text>
  <text x="80" y="422" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#6B7280">traffic in real time.</text>

  <!-- Traffic status indicators -->
  <g transform="translate(80, 480)">
    <circle cx="10" cy="10" r="8" fill="#4DAD80"/>
    <text x="28" y="16" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#9CA3AF">Clear</text>

    <circle cx="130" cy="10" r="8" fill="#FDC021"/>
    <text x="148" y="16" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#9CA3AF">Moderate</text>

    <circle cx="280" cy="10" r="8" fill="#F77070"/>
    <text x="298" y="16" font-family="-apple-system, SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#9CA3AF">Heavy</text>
  </g>

  <!-- Decorative route line on the right side -->
  <g transform="translate(750, 100)" opacity="0.6">
    <circle cx="100" cy="420" r="30" fill="#4DAD80" opacity="0.8"/>
    <path d="M100 420 C100 250, 300 320, 300 100" fill="none" stroke="url(#congestion)" stroke-width="18" stroke-linecap="round"/>
    <circle cx="300" cy="100" r="30" fill="#4DAD80" opacity="0.8"/>
    <circle cx="300" cy="100" r="55" fill="none" stroke="#4DAD80" stroke-width="6" opacity="0.3"/>
    <circle cx="300" cy="100" r="85" fill="none" stroke="#4DAD80" stroke-width="4" opacity="0.12"/>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#stripe)"/>
</svg>
